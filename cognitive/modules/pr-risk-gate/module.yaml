# Cognitive Module Manifest v2.2
name: pr-risk-gate
version: 2.2.16
responsibility: Reviews PR diffs or code snippets and returns a merge-gate decision contract

tier: decision
schema_strictness: high

excludes:
  - rewriting code
  - auto-applying fixes
  - executing code
  - judging style-only issues as blocking

policies:
  network: deny
  filesystem_write: deny
  side_effects: deny
  code_execution: deny

tools:
  policy: deny_by_default
  allowed: []
  denied:
    - write_file
    - shell
    - network
    - code_interpreter

overflow:
  enabled: true
  recoverable: true
  max_items: 5
  require_suggested_mapping: true

enums:
  strategy: extensible

failure:
  contract: error_union
  partial_allowed: true
  must_return_error_schema: true

runtime_requirements:
  structured_output: true
  max_input_tokens: 12000
  preferred_capabilities:
    - json_mode
    - long_context

io:
  input: ./schema.json#/input
  data: ./schema.json#/data
  meta: ./schema.json#/meta
  error: ./schema.json#/error

compat:
  accepts_v21_payload: true
  runtime_auto_wrap: true
  schema_output_alias: data

constraints:
  no_network: true
  no_side_effects: true
  no_inventing_data: true
  require_confidence: true
  require_rationale: true

tests:
  - tests/sql_injection.input.json -> tests/sql_injection.expected.json
  - tests/input_validation.input.json -> tests/input_validation.expected.json
